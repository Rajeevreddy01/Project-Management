services:
  - type: web
    name: pms-backend
    runtime: java
    rootDir: backend
    buildCommand: sh ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:4200
